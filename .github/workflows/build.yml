name: Build Electron App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: npx electron-builder --win --x64 -c.win.sign=false
      - uses: actions/upload-artifact@v3
        with:
          name: MiBotEjecutable
          path: dist/*.exe
